/* ═══════════════════════════════════════════
   CUÁNDO v6 — Design System
   Session themes · Image-first · Premium
═══════════════════════════════════════════ */
:root {
  --bg: #060610; --bg2: #09090F;
  --card: #0F0F1C; --elev: #151525; --elev2: #1C1C30;
  --bdr: rgba(255,255,255,.06); --bdr-hi: rgba(255,255,255,.11);
  /* Accent — overridden per-plan theme */
  --acc: #CBFF00; --acc-dim: rgba(203,255,0,.06);
  --acc-soft: rgba(203,255,0,.12); --acc-glow: rgba(203,255,0,.3);
  --acc-glow2: rgba(203,255,0,.08); --bdr-glow: rgba(203,255,0,.18);
  --acc-bg: #0A1100;
  --grn: #00E28A; --grn-dim: rgba(0,226,138,.07); --grn-glow: rgba(0,226,138,.25);
  --red: #FF4057; --red-dim: rgba(255,64,87,.08);
  --txt: #EFEFEB; --txt2: #8888A0; --txt3: #5A5A72; --mut: #404055;
  --r: 22px; --rsm: 16px; --rxs: 10px;
  --shadow-sm: 0 2px 12px rgba(0,0,0,.4);
  --shadow: 0 8px 40px rgba(0,0,0,.6);
  --shadow-lg: 0 24px 80px rgba(0,0,0,.75);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  --ease-out: cubic-bezier(.25,.46,.45,.94);
  --ease-in-out: cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overscroll-behavior:none;scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
button,input,textarea{font-family:'DM Sans',sans-serif;}
/* Grain */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.028;}

/* ── SPLASH · TRÓPIX premium intro ───────────────── */
#splash{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;overflow:hidden;isolation:isolate;background:#020308;transition:opacity .9s var(--ease-out),transform .9s var(--ease-out),filter .9s var(--ease-out);}
#splash.exit{opacity:0;transform:scale(1.018);filter:blur(8px);pointer-events:none;}
.tpx-backdrop{position:absolute;inset:0;z-index:-5;background:radial-gradient(circle at 50% 27%,rgba(255,255,255,.105),transparent 0 15rem),radial-gradient(circle at 44% 43%,rgba(255,177,61,.14),transparent 0 15rem),radial-gradient(circle at 35% 55%,rgba(18,220,255,.115),transparent 0 22rem),radial-gradient(circle at 65% 56%,rgba(255,44,195,.125),transparent 0 22rem),linear-gradient(180deg,#090b16 0%,#03040a 58%,#000 100%);filter:saturate(.94) contrast(1.08);transform:scale(1.045);animation:tpxBackdropIn 1.25s var(--ease-out) both;}
.tpx-backdrop::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 0 36%,rgba(0,0,0,.42) 70%,rgba(0,0,0,.96) 100%),linear-gradient(90deg,rgba(0,0,0,.62),transparent 30%,transparent 70%,rgba(0,0,0,.62));}
.tpx-grain{position:absolute;inset:-80px;z-index:8;pointer-events:none;opacity:.032;mix-blend-mode:screen;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.74' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.78'/%3E%3C/svg%3E");animation:tpxGrainMove 1.25s steps(2) infinite;}
.tpx-overhead{position:absolute;top:-22vh;left:50%;z-index:-2;width:min(62vw,920px);height:min(56vh,610px);transform:translateX(-50%);pointer-events:none;background:radial-gradient(ellipse at top,rgba(255,255,255,.22),rgba(255,255,255,.055) 36%,transparent 74%);filter:blur(18px);opacity:0;animation:tpxOverheadIn 1.2s var(--ease-out) .08s both;}
.tpx-spot{position:absolute;top:-8vh;z-index:-2;width:clamp(130px,16vw,240px);height:88vh;pointer-events:none;opacity:0;filter:blur(7px);mix-blend-mode:screen;clip-path:polygon(46% 0,54% 0,100% 100%,0 100%);animation:tpxSpotIn 1.18s var(--ease-out) .28s both;}
.tpx-spot.left{left:14%;transform:rotate(8deg);background:linear-gradient(180deg,rgba(18,220,255,.44),transparent 78%);}
.tpx-spot.right{right:14%;transform:rotate(-8deg);background:linear-gradient(180deg,rgba(255,44,195,.42),transparent 78%);}
.tpx-side-light{position:absolute;bottom:17vh;z-index:-1;width:min(28vw,380px);height:2px;pointer-events:none;opacity:.9;filter:blur(.2px);}
.tpx-side-light.left{left:-2vw;background:linear-gradient(90deg,transparent,rgba(18,220,255,.90),transparent);box-shadow:0 0 18px rgba(18,220,255,.48);}
.tpx-side-light.right{right:-2vw;background:linear-gradient(90deg,transparent,rgba(255,44,195,.90),transparent);box-shadow:0 0 18px rgba(255,44,195,.48);}
.tpx-haze{position:absolute;left:0;right:0;bottom:0;z-index:-1;height:42vh;pointer-events:none;background:radial-gradient(ellipse at 18% 82%,rgba(18,220,255,.22),transparent 26%),radial-gradient(ellipse at 82% 82%,rgba(255,44,195,.22),transparent 26%),radial-gradient(ellipse at 50% 100%,rgba(255,255,255,.075),transparent 34%);filter:blur(18px);opacity:.82;}
.tpx-floor{position:absolute;left:50%;bottom:-15vh;z-index:-2;width:130vw;height:42vh;transform:translateX(-50%) perspective(760px) rotateX(70deg);pointer-events:none;background:radial-gradient(ellipse at 37% 38%,rgba(18,220,255,.32),transparent 22%),radial-gradient(ellipse at 63% 39%,rgba(255,44,195,.36),transparent 23%),linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);opacity:.56;filter:blur(10px);mask-image:linear-gradient(to bottom,black 0 54%,transparent 90%);}
.tpx-stage{position:relative;z-index:2;width:min(94vw,1120px);min-height:100dvh;display:grid;align-items:center;justify-items:center;padding:max(18px,env(safe-area-inset-top)) 18px max(22px,env(safe-area-inset-bottom));}
.tpx-center{position:relative;width:100%;display:grid;justify-items:center;align-self:center;transform:translateY(2vh);}
.tpx-logo-shell{position:relative;display:grid;place-items:center;width:clamp(330px,59vw,880px);aspect-ratio:1.64/1;opacity:0;transform:translateY(26px) scale(.952);filter:blur(14px);animation:tpxLogoShellIn 1.08s var(--ease-spring) .18s both;will-change:transform,opacity,filter;}
.tpx-logo-aura{position:absolute;inset:7% 8% 17%;z-index:-2;border-radius:999px;background:radial-gradient(ellipse at 37% 46%,rgba(255,44,195,.32),transparent 45%),radial-gradient(ellipse at 63% 48%,rgba(18,220,255,.30),transparent 48%),radial-gradient(ellipse at 50% 24%,rgba(255,177,61,.24),transparent 42%);filter:blur(35px);opacity:0;transform:scale(.78);animation:tpxAuraIn 1.18s var(--ease-out) .36s both,tpxAuraBreathe 4.4s ease-in-out 1.7s infinite;}
.tpx-logo-shadow{position:absolute;inset:59% 5% -2%;z-index:-3;border-radius:50%;background:radial-gradient(ellipse at center,rgba(0,0,0,.94),transparent 72%),radial-gradient(ellipse at 34% 50%,rgba(18,220,255,.28),transparent 68%),radial-gradient(ellipse at 70% 50%,rgba(255,44,195,.34),transparent 68%);filter:blur(24px);opacity:0;transform:scale(.7);animation:tpxShadowIn 1.05s var(--ease-out) .35s both;}
.tpx-logo{position:relative;z-index:4;display:block;width:100%;height:100%;object-fit:contain;transform:translateZ(0);image-rendering:auto;filter:drop-shadow(0 30px 38px rgba(0,0,0,.68)) drop-shadow(0 0 8px rgba(255,255,255,.05));user-select:none;-webkit-user-drag:none;animation:tpxLogoFloat 4.8s ease-in-out 1.55s infinite;}
.tpx-sweep{position:absolute;inset:-10% -13%;z-index:6;opacity:0;pointer-events:none;mix-blend-mode:screen;transform:translateX(-122%) skewX(-14deg);background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0) 34%,rgba(255,255,255,.62) 49%,rgba(255,255,255,.13) 58%,transparent 74%);animation:tpxSweep 1.22s var(--ease-out) .72s both;}
.tpx-platform{position:relative;z-index:2;width:min(72vw,760px);height:clamp(22px,3.2vw,38px);margin-top:clamp(-26px,-2.2vw,-10px);border-radius:20px 20px 10px 10px;opacity:0;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.016)),#070911;border:1px solid rgba(255,255,255,.09);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 18px 46px rgba(0,0,0,.72),-20px 0 34px rgba(18,220,255,.12),20px 0 34px rgba(255,44,195,.13);animation:tpxPlatformIn .74s var(--ease-out) .65s both;}
.tpx-platform::before{content:'';position:absolute;left:5%;right:5%;bottom:-3px;height:2px;border-radius:999px;background:linear-gradient(90deg,transparent,#12dcff,#ff2cc3,transparent);opacity:.72;}
.tpx-loader{position:relative;z-index:12;width:min(760px,82vw);display:grid;grid-template-columns:auto minmax(170px,1fr) auto;align-items:center;gap:18px;margin-top:clamp(34px,5.2vw,56px);opacity:0;transform:translateY(12px);animation:tpxLoaderIn .76s var(--ease-out) .9s both;}
.tpx-loader-label{color:rgba(255,255,255,.78);font-size:clamp(.62rem,1.12vw,.80rem);font-weight:700;letter-spacing:.52em;text-indent:.52em;white-space:nowrap;}
.tpx-track{position:relative;height:12px;padding:2px;border-radius:999px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.125);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.55),0 0 28px rgba(255,44,195,.11);}
.tpx-fill{display:block;width:0%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#12dcff,#2f7dff 35%,#7a42ff 64%,#ff2cc3);box-shadow:0 0 18px rgba(18,220,255,.44),0 0 22px rgba(255,44,195,.36);transition:width .16s linear;position:relative;overflow:hidden;}
.tpx-fill::after{content:'';position:absolute;top:0;bottom:0;width:24%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.72),transparent);transform:translateX(-120%);animation:tpxBarShine .92s linear infinite;}
.tpx-percent{min-width:62px;color:#fff;text-align:right;font-size:clamp(1.12rem,2.55vw,1.68rem);font-weight:500;letter-spacing:.015em;text-shadow:0 0 18px rgba(255,44,195,.44);}
.tpx-dots{position:absolute;right:76px;top:-14px;display:flex;gap:5px;pointer-events:none;}
.tpx-dots i{display:block;width:4px;height:4px;border-radius:50%;background:#ff2cc3;box-shadow:0 0 10px rgba(255,44,195,.75);opacity:.24;animation:tpxDots 1s ease-in-out infinite;}
.tpx-dots i:nth-child(2){animation-delay:.12s}.tpx-dots i:nth-child(3){animation-delay:.24s}.tpx-dots i:nth-child(4){animation-delay:.36s}
@media (max-width:860px){.tpx-stage{width:100vw}.tpx-center{transform:translateY(1vh)}.tpx-logo-shell{width:min(93vw,720px)}.tpx-platform{width:min(82vw,640px);margin-top:-8px}.tpx-loader{width:min(88vw,660px);gap:12px}.tpx-dots{right:70px}.tpx-spot.left{left:4%}.tpx-spot.right{right:4%}}
@media (max-width:560px){.tpx-center{transform:translateY(-1vh)}.tpx-logo-shell{width:min(96vw,560px)}.tpx-platform{width:86vw;height:22px;margin-top:0}.tpx-loader{width:90vw;grid-template-columns:1fr auto;gap:10px 12px;margin-top:30px}.tpx-loader-label{grid-column:1/-1;font-size:.68rem;letter-spacing:.42em;text-indent:.42em}.tpx-track{height:11px}.tpx-percent{min-width:54px;font-size:1.25rem}.tpx-dots{right:62px;top:-12px}.tpx-overhead{width:92vw}.tpx-spot{opacity:.18}.tpx-side-light{bottom:20vh}}
@media (max-height:680px) and (orientation:landscape){.tpx-logo-shell{width:min(62vw,620px)}.tpx-platform{width:min(55vw,560px);height:20px;margin-top:-8px}.tpx-loader{margin-top:22px;width:min(62vw,620px)}.tpx-center{transform:translateY(-1vh)}}
@keyframes tpxBackdropIn{from{opacity:0;transform:scale(1.1)}to{opacity:1;transform:scale(1.045)}}@keyframes tpxGrainMove{to{transform:translate3d(-2%,1%,0)}}@keyframes tpxOverheadIn{from{opacity:0;transform:translateX(-50%) translateY(-24px)}to{opacity:.82;transform:translateX(-50%) translateY(0)}}@keyframes tpxSpotIn{to{opacity:.35}}@keyframes tpxLogoShellIn{to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}@keyframes tpxAuraIn{to{opacity:1;transform:scale(1)}}@keyframes tpxAuraBreathe{0%,100%{opacity:.84;transform:scale(1);filter:blur(35px)}50%{opacity:1;transform:scale(1.03);filter:blur(39px)}}@keyframes tpxShadowIn{to{opacity:1;transform:scale(1)}}@keyframes tpxLogoFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.004)}}@keyframes tpxSweep{0%{opacity:0;transform:translateX(-122%) skewX(-14deg)}16%{opacity:.86}100%{opacity:0;transform:translateX(122%) skewX(-14deg)}}@keyframes tpxPlatformIn{to{opacity:1}}@keyframes tpxLoaderIn{to{opacity:1;transform:translateY(0)}}@keyframes tpxBarShine{to{transform:translateX(420%)}}@keyframes tpxDots{0%,100%{opacity:.24;transform:translateY(0)}50%{opacity:1;transform:translateY(-2px)}}


/* ── APP SHELL ─────────────────────── */
#app{position:relative;z-index:1;min-height:100vh;}
#confetti-canvas{position:fixed;inset:0;z-index:8000;pointer-events:none;}
.view{max-width:500px;margin:0 auto;padding-bottom:100px;}
.page-enter{animation:pageEnter .38s var(--ease-out) both;}
@keyframes pageEnter{from{opacity:0;transform:translateY(24px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.s1{animation:fadeUp .4s var(--ease-out) .05s both;}
.s2{animation:fadeUp .4s var(--ease-out) .12s both;}
.s3{animation:fadeUp .4s var(--ease-out) .19s both;}
.s4{animation:fadeUp .4s var(--ease-out) .26s both;}
.s5{animation:fadeUp .4s var(--ease-out) .33s both;}
.s6{animation:fadeUp .4s var(--ease-out) .4s both;}
.s7{animation:fadeUp .4s var(--ease-out) .47s both;}
/* Scroll reveal */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .6s var(--ease-out),transform .6s var(--ease-out);}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-d1{transition-delay:.08s;}
.reveal-d2{transition-delay:.16s;}

/* ── NAV ───────────────────────────── */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(6,6,16,.85);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid var(--bdr);}
.wordmark{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.03em;background:linear-gradient(135deg,var(--acc) 0%,#fff 60%,var(--acc) 100%);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmerText 4s ease infinite;display:flex;align-items:center;gap:8px;cursor:pointer;}
@keyframes shimmerText{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.nav-icon{width:26px;height:26px;border-radius:7px;overflow:hidden;flex-shrink:0;}
.nav-icon img{width:100%;height:100%;object-fit:cover;}
.nav-icon-fallback{width:26px;height:26px;border-radius:7px;background:var(--acc-dim);border:1px solid var(--bdr-glow);display:flex;align-items:center;justify-content:center;}
.wordmark-dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc-glow);animation:blink 2.5s ease infinite;flex-shrink:0;}
.lang-pill{display:flex;gap:2px;background:var(--elev);border-radius:999px;padding:3px;border:1px solid var(--bdr);}
.lang-btn{padding:5px 13px;border-radius:999px;border:none;background:transparent;font-size:.75rem;font-weight:600;color:var(--txt3);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.lang-btn.on{background:var(--elev2);color:var(--txt);box-shadow:0 1px 6px rgba(0,0,0,.5);}

/* ── HERO ──────────────────────────── */
.hero{position:relative;overflow:hidden;padding:0 20px 0;min-height:calc(100svh - 53px);display:flex;flex-direction:column;}
.hero-bg-img{position:absolute;inset:0;z-index:0;background-image:url('./img/hero-bg.jpg');background-size:cover;background-position:center;opacity:.07;pointer-events:none;}
.hero-bg-grad{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse at 55% 0%,rgba(203,255,0,.08) 0%,transparent 55%),radial-gradient(ellipse at 0% 100%,rgba(0,226,138,.04) 0%,transparent 50%);pointer-events:none;}
.hero-orb{position:absolute;border-radius:50%;pointer-events:none;z-index:0;}
.hero-orb-1{top:-100px;left:-60px;width:340px;height:340px;background:radial-gradient(circle,rgba(203,255,0,.09) 0%,transparent 65%);animation:orbFloat 8s ease-in-out infinite;}
.hero-orb-2{top:60px;right:-80px;width:240px;height:240px;background:radial-gradient(circle,rgba(0,226,138,.06) 0%,transparent 65%);animation:orbFloat 6s ease-in-out infinite reverse;}
.hero-grid{position:absolute;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse at 50% 30%,black 20%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse at 50% 30%,black 20%,transparent 75%);}
.hero-content{position:relative;z-index:1;display:flex;flex-direction:column;flex:1;padding-top:36px;}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-20px) scale(1.05);}}

.eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--acc-dim);border:1px solid var(--bdr-glow);border-radius:999px;padding:7px 16px;font-size:.73rem;font-weight:600;color:var(--acc);letter-spacing:.04em;margin-bottom:28px;width:fit-content;box-shadow:0 0 20px var(--acc-glow2);}
.eyebrow-pulse{width:6px;height:6px;border-radius:50%;background:var(--acc);position:relative;box-shadow:0 0 6px var(--acc-glow);}
.eyebrow-pulse::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid var(--acc);animation:sonar 2s ease infinite;}
@keyframes sonar{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(2.5);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

.hero-h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(4rem,18vw,6.5rem);line-height:.86;letter-spacing:-.07em;margin-bottom:22px;}
.hero-h1-accent{color:var(--acc);display:inline-block;text-shadow:0 0 60px var(--acc-glow),0 0 120px var(--acc-glow2);animation:glowPulse 3s ease infinite;}
@keyframes glowPulse{0%,100%{text-shadow:0 0 60px var(--acc-glow),0 0 120px var(--acc-glow2);}50%{text-shadow:0 0 90px var(--acc-glow),0 0 200px var(--acc-glow2);}}
.hero-tagline{font-size:1.05rem;color:var(--txt2);line-height:1.7;margin-bottom:32px;max-width:300px;font-weight:300;}

/* CTA */
.btn-hero{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:var(--acc);color:#060610;padding:17px 32px;border-radius:999px;font-size:1.05rem;font-weight:700;border:none;cursor:pointer;width:100%;position:relative;overflow:hidden;transition:transform .2s var(--ease-spring),box-shadow .2s ease;-webkit-tap-highlight-color:transparent;letter-spacing:-.01em;}
.btn-hero::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:btnShimmer 3s ease infinite;}
@keyframes btnShimmer{to{left:180%;}}
.btn-hero:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 16px 48px var(--acc-glow),0 4px 12px rgba(0,0,0,.3);}
.btn-hero:active{transform:scale(.97);box-shadow:none;}
.btn-hero .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:rippleAnim .6s ease;pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}

/* Live preview card */
.lp-wrap{margin-top:36px;flex:1;max-height:280px;}
.lp-card{background:var(--card);border:1px solid var(--bdr-hi);border-radius:var(--r);padding:20px;box-shadow:var(--shadow),0 0 60px var(--acc-glow2);position:relative;overflow:hidden;}
.lp-card::before{content:'';position:absolute;top:-50px;right:-50px;width:150px;height:150px;background:radial-gradient(circle,var(--acc-glow2) 0%,transparent 70%);pointer-events:none;}
.lp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.lp-plan-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:8px;}
.lp-live-badge{display:flex;align-items:center;gap:5px;font-size:.68rem;font-weight:700;color:var(--grn);letter-spacing:.06em;text-transform:uppercase;background:var(--grn-dim);border:1px solid rgba(0,226,138,.15);padding:4px 9px;border-radius:999px;}
.lp-live-dot{width:5px;height:5px;border-radius:50%;background:var(--grn);box-shadow:0 0 5px var(--grn-glow);animation:blink 1.4s ease infinite;}
.lp-opt{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;margin-bottom:8px;border:1px solid var(--bdr);transition:all .5s var(--ease-spring);background:var(--elev);}
.lp-opt.hot{border-color:rgba(0,226,138,.35);background:var(--grn-dim);transform:scale(1.015);box-shadow:0 4px 24px rgba(0,226,138,.12);}
.lp-dot{width:8px;height:8px;border-radius:50%;background:var(--bdr-hi);flex-shrink:0;transition:all .4s ease;}
.lp-opt.hot .lp-dot{background:var(--grn);box-shadow:0 0 8px var(--grn-glow);}
.lp-label{flex:1;font-size:.88rem;color:var(--txt2);transition:color .3s;}
.lp-opt.hot .lp-label{color:var(--txt);font-weight:500;}
.lp-bar-wrap{width:68px;height:4px;background:var(--elev2);border-radius:999px;overflow:hidden;}
.lp-bar{height:100%;border-radius:999px;background:var(--grn);width:0;transition:width .7s var(--ease-out);}
.lp-count{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.9rem;color:var(--acc);min-width:18px;text-align:right;}
.live-users{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr);}
.live-av{width:26px;height:26px;border-radius:50%;border:2px solid var(--card);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;margin-left:-6px;flex-shrink:0;}
.live-av:first-child{margin-left:0;}
.live-count{font-size:.78rem;color:var(--txt2);line-height:1.4;}

/* ── SCREENSHOTS ───────────────────── */
.screenshots{display:flex;gap:12px;overflow-x:auto;padding:0 20px 4px;margin:28px 0 0;scrollbar-width:none;-ms-overflow-style:none;}
.screenshots::-webkit-scrollbar{display:none;}
.sc-card{flex-shrink:0;width:180px;height:320px;border-radius:20px;overflow:hidden;border:1px solid var(--bdr-hi);box-shadow:var(--shadow);position:relative;transition:transform .3s var(--ease-spring);}
.sc-card:hover{transform:translateY(-4px);}
.sc-card img{width:100%;height:100%;object-fit:cover;display:block;}
.sc-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(6,6,16,.9) 0%,transparent 100%);padding:28px 12px 12px;font-size:.76rem;font-weight:600;color:var(--txt2);text-align:center;}

/* ── SECTIONS ──────────────────────── */
.section{padding:48px 20px 0;}
.section-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.04em;margin-bottom:24px;}
.steps{display:flex;flex-direction:column;gap:10px;}
.step-card{display:flex;align-items:flex-start;gap:18px;padding:20px;border-radius:18px;background:var(--card);border:1px solid var(--bdr);transition:border-color .2s,transform .25s var(--ease-spring);cursor:default;}
.step-card:hover{border-color:var(--bdr-glow);transform:translateX(4px);}
.step-num{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.7rem;color:var(--acc);min-width:32px;line-height:1;text-shadow:0 0 30px var(--acc-glow);}
.step-title{font-weight:700;font-size:.95rem;margin-bottom:4px;}
.step-desc{font-size:.875rem;color:var(--txt2);font-weight:300;line-height:1.6;}

/* Feature photo */
.feature-photo{position:relative;margin:28px 20px 0;border-radius:24px;overflow:hidden;height:220px;}
.feature-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.feature-photo-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,16,.9) 0%,rgba(6,6,16,.2) 60%,transparent 100%);}
.feature-photo-text{position:absolute;bottom:20px;left:20px;right:20px;}
.fp-label{font-size:.7rem;font-weight:700;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.fp-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.1rem;line-height:1.3;}

/* ── BUTTONS ───────────────────────── */
.btn{display:flex;align-items:center;justify-content:center;gap:9px;padding:16px 24px;border-radius:999px;font-size:.9375rem;font-weight:600;border:none;cursor:pointer;width:100%;position:relative;overflow:hidden;transition:transform .2s var(--ease-spring),box-shadow .2s,opacity .2s;-webkit-tap-highlight-color:transparent;letter-spacing:-.01em;margin-bottom:12px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{background:var(--acc);color:#060610;}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px var(--acc-glow);}
.btn-primary:active:not(:disabled){transform:scale(.97);}
.btn-outline{background:transparent;color:var(--txt);border:1.5px solid var(--bdr-hi);}
.btn-outline:hover{border-color:var(--bdr-glow);background:var(--acc-dim);}
.btn-ghost{background:transparent;color:var(--txt2);border:none;font-weight:400;}
.btn-ghost:hover{color:var(--txt);}
.btn-wa{background:#25D366;color:#fff;}
.btn-wa:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(37,211,102,.35);background:#1ebe5c;}
.btn-wa:active:not(:disabled){transform:scale(.97);}
.btn-spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#060610;border-radius:50%;animation:spin .7s linear infinite;}
.copy-btn{padding:8px 16px;border-radius:999px;border:1.5px solid var(--bdr-glow);background:var(--acc-dim);color:var(--acc);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.copy-btn.ok{background:var(--acc-soft);}
.copy-btn:hover{background:var(--acc-soft);}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── FORM / SECTIONS ───────────────── */
.sec{padding:0 20px;}
.sec-label{font-size:.68rem;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.pg-head{padding:20px 20px 4px;}
.pg-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.7rem;letter-spacing:-.04em;margin-bottom:6px;}
.pg-sub{font-size:.9rem;color:var(--txt2);font-weight:300;line-height:1.6;}
.back-btn{display:flex;align-items:center;gap:8px;padding:12px 20px;background:none;border:none;color:var(--txt2);font-size:.875rem;cursor:pointer;transition:color .2s;font-family:'DM Sans',sans-serif;}
.back-btn:hover{color:var(--txt);}
.step-bar{display:flex;gap:5px;padding:0 20px 4px;}
.step-seg{flex:1;height:3px;border-radius:999px;background:var(--bdr-hi);}
.step-seg.on{background:var(--acc);box-shadow:0 0 8px var(--acc-glow);}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:var(--shadow-sm);}

/* ── INPUTS ────────────────────────── */
.inp-grp{margin-bottom:18px;}
label{display:block;font-size:.68rem;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:9px;}
input[type=text],input[type=date],input[type=time]{width:100%;padding:15px 18px;border:1.5px solid var(--bdr-hi);border-radius:var(--rsm);font-size:1rem;color:var(--txt);background:var(--elev);outline:none;transition:border-color .18s,box-shadow .18s,background .18s;-webkit-appearance:none;appearance:none;color-scheme:dark;font-family:'DM Sans',sans-serif;}
input:focus{border-color:var(--acc);box-shadow:0 0 0 4px var(--acc-dim);background:var(--elev2);}
input::placeholder{color:var(--mut);}

/* ── SLOT BUILDER ──────────────────── */
.slot{background:var(--elev);border:1px solid var(--bdr);border-radius:var(--rsm);padding:16px;margin-bottom:10px;animation:fadeUp .28s var(--ease-out) both;transition:border-color .18s;}
.slot:focus-within{border-color:var(--bdr-glow);}
.slot-num{font-size:.65rem;font-weight:700;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.slot-row{display:flex;gap:8px;align-items:center;}
.slot-row input{flex:1;padding:12px 14px;font-size:.9375rem;}
.del-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:transparent;color:var(--txt3);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.del-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.add-slot-btn{width:100%;padding:14px;border:1.5px dashed var(--bdr-glow);border-radius:var(--rsm);background:var(--acc-dim);color:var(--acc);font-weight:600;font-size:.9375rem;cursor:pointer;transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:9px;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
.add-slot-btn:hover{background:var(--acc-soft);}
.add-slot-btn:active{transform:scale(.98);}
.add-slot-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── SHARE ─────────────────────────── */
.share-hero{text-align:center;padding:36px 20px 28px;position:relative;overflow:hidden;}
.share-hero-bg{position:absolute;inset:0;z-index:0;background-image:url('./img/share-visual.jpg');background-size:cover;background-position:center;opacity:.05;pointer-events:none;}
.share-icon-wrap{display:inline-flex;align-items:center;justify-content:center;width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--acc-dim),var(--grn-dim));border:1px solid var(--bdr-glow);font-size:2.5rem;margin-bottom:20px;animation:celebIn .6s var(--ease-spring) both;box-shadow:0 0 60px var(--acc-glow2);position:relative;z-index:1;}
@keyframes celebIn{0%{opacity:0;transform:scale(.4) rotate(-20deg);}100%{opacity:1;transform:scale(1) rotate(0deg);}}
.link-box{background:var(--elev);border:1px solid var(--bdr-hi);border-radius:var(--rsm);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:border-color .2s;}
.link-box:hover{border-color:var(--bdr-glow);}
.link-text{flex:1;font-size:.82rem;color:var(--txt2);font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* WA message preview */
.wa-preview{background:rgba(37,211,102,.06);border:1px solid rgba(37,211,102,.14);border-radius:14px;padding:14px 16px;margin-bottom:10px;font-size:.83rem;color:var(--txt2);line-height:1.65;white-space:pre-line;font-style:italic;}
.wa-preview strong{color:var(--txt);font-style:normal;}
/* Theme badge */
.theme-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;background:var(--acc-dim);border:1px solid var(--bdr-glow);font-size:.7rem;font-weight:700;color:var(--acc);letter-spacing:.06em;text-transform:uppercase;}
/* URL warning */
.url-warn{background:rgba(255,200,0,.05);border:1px solid rgba(255,200,0,.2);border-radius:12px;padding:11px 14px;font-size:.81rem;color:#C8A100;line-height:1.6;margin-bottom:14px;}
.url-warn strong{color:#FFCA28;}

/* ── RESPOND ───────────────────────── */
.invite-card{background:linear-gradient(135deg,var(--elev),var(--elev2));border:1px solid var(--bdr-hi);border-radius:var(--r);padding:18px 20px;margin-bottom:22px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow-sm);}
.invite-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--acc-dim),var(--grn-dim));border:1.5px solid var(--bdr-glow);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;font-family:'Bricolage Grotesque',sans-serif;color:var(--acc);flex-shrink:0;box-shadow:0 0 0 4px var(--acc-dim),0 0 24px var(--acc-glow2);}
.invite-from{font-size:.78rem;color:var(--txt3);margin-bottom:4px;}
.invite-plan{font-weight:600;font-size:1rem;}
.opt-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--rsm);padding:17px 20px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:border-color .25s,background .25s,transform .3s var(--ease-spring),box-shadow .25s;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
.opt-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--grn-dim),transparent);opacity:0;transition:opacity .3s;}
.opt-card:active{transform:scale(.975)!important;}
.opt-card.sel{border-color:rgba(0,226,138,.4);background:var(--grn-dim);transform:scale(1.02);box-shadow:0 6px 32px rgba(0,226,138,.12);}
.opt-card.sel::before{opacity:1;}
.opt-ring{width:26px;height:26px;border-radius:50%;border:2px solid var(--bdr-hi);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s var(--ease-spring);color:transparent;font-size:.75rem;position:relative;z-index:1;}
.opt-card.sel .opt-ring{border-color:var(--grn);background:var(--grn);color:#060610;animation:ringBounce .35s var(--ease-spring) both;box-shadow:0 0 12px var(--grn-glow);}
@keyframes ringBounce{0%{transform:scale(.5);}100%{transform:scale(1);}}
.opt-label{font-weight:500;font-size:1rem;color:var(--txt);line-height:1.25;position:relative;z-index:1;}

/* ── RESULTS ───────────────────────── */
.best-card{background:linear-gradient(135deg,var(--acc-bg),#060610);border:1px solid var(--bdr-glow);border-radius:var(--r);padding:26px;margin-bottom:20px;position:relative;overflow:hidden;animation:bestIn .6s var(--ease-spring) both;box-shadow:0 8px 40px var(--acc-glow2);}
@keyframes bestIn{0%{opacity:0;transform:translateY(20px) scale(.95);}100%{opacity:1;transform:translateY(0) scale(1);}}
.best-card::before{content:'';position:absolute;top:-80px;right:-80px;width:200px;height:200px;background:radial-gradient(circle,var(--acc-glow2) 0%,transparent 70%);}
.best-label{font-size:.68rem;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.14em;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.best-label::before{content:'✦';}
.best-date{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.7rem;letter-spacing:-.03em;color:var(--txt);line-height:1.15;margin-bottom:12px;}
.best-count{font-size:.95rem;color:var(--txt2);font-weight:300;}
.best-names{font-size:.82rem;color:var(--txt3);margin-top:6px;}
.result-row{padding:15px 0;border-bottom:1px solid var(--bdr);}
.result-row:last-child{border-bottom:none;}
.result-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.result-date{font-weight:500;font-size:.95rem;}
.result-count{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.15rem;color:var(--acc);}
.result-track{height:5px;background:var(--elev2);border-radius:999px;overflow:hidden;margin-bottom:8px;}
.result-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--acc),rgba(255,255,255,.7));width:0;transition:width .85s var(--ease-out);box-shadow:0 0 8px var(--acc-glow2);}
.result-names{font-size:.78rem;color:var(--txt3);line-height:1.5;}

/* ── TOAST ─────────────────────────── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--elev2);color:var(--txt);border:1px solid var(--bdr-hi);padding:13px 24px;border-radius:999px;font-size:.875rem;font-weight:500;transition:transform .35s var(--ease-spring),opacity .35s;z-index:9999;white-space:nowrap;pointer-events:none;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── MISC ──────────────────────────── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:16px;color:var(--txt2);font-size:.9375rem;}
.loader-ring{width:40px;height:40px;border:2px solid var(--bdr-hi);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;box-shadow:0 0 20px var(--acc-glow2);}
.divider{height:1px;background:var(--bdr);margin:18px 0;}
.err-msg{background:var(--red-dim);border:1px solid rgba(255,64,87,.2);color:var(--red);padding:13px 16px;border-radius:var(--rxs);font-size:.875rem;margin-bottom:16px;display:flex;align-items:center;gap:9px;animation:fadeUp .2s ease both;}
.cfg-warn{background:rgba(255,200,0,.05);border:1px solid rgba(255,200,0,.15);color:#C8A100;border-radius:var(--rxs);padding:13px 16px;font-size:.84rem;margin-bottom:18px;line-height:1.6;}
.cfg-warn code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-size:.78rem;}
.powered{text-align:center;padding:32px 0 0;font-size:.68rem;color:var(--txt3);letter-spacing:.06em;display:flex;align-items:center;justify-content:center;gap:8px;} .powered img{opacity:.9;}
.success-ring{width:6px;height:6px;border-radius:50%;background:var(--grn);display:inline-block;box-shadow:0 0 8px var(--grn-glow);animation:blink 1.8s ease infinite;}
.empty-state{text-align:center;padding:56px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.empty-icon{font-size:4rem;opacity:.5;animation:floatIdle 3s ease infinite;}
@keyframes floatIdle{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.empty-text{font-size:.95rem;color:var(--txt2);font-weight:300;}
.particle{position:fixed;pointer-events:none;z-index:0;border-radius:50%;background:radial-gradient(circle,var(--acc),transparent);opacity:0;animation:particleFloat linear infinite;}
@keyframes particleFloat{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:.3;}90%{opacity:.15;}100%{transform:translateY(-10vh) scale(1);opacity:0;}}



/* ── FINAL POLISH · premium publish pass ───────────── */
button{touch-action:manipulation;}
.nav{background:linear-gradient(180deg,rgba(7,7,18,.90),rgba(7,7,18,.72));box-shadow:0 12px 34px rgba(0,0,0,.22);}
.nav::after{content:'';position:absolute;left:20px;right:20px;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--bdr-glow),transparent);opacity:.72;}
.nav-icon{background:rgba(255,255,255,.04);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 0 18px var(--acc-glow2);}
.lang-btn:hover{color:var(--txt);background:rgba(255,255,255,.04);}
.btn,.btn-hero,.copy-btn,.add-slot-btn,.lang-btn,.back-btn,.del-btn{transform:translateZ(0);will-change:transform;}
.btn,.btn-hero{isolation:isolate;min-height:52px;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 10px 30px rgba(0,0,0,.22);}
.btn::after,.btn-hero::after{content:'';position:absolute;inset:1px;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.22),transparent 45%,rgba(0,0,0,.10));opacity:.38;pointer-events:none;z-index:-1;}
.btn-primary,.btn-hero{background:linear-gradient(135deg,#F1FF69 0%,var(--acc) 44%,#8DFF00 100%);color:#05060A;text-shadow:0 1px 0 rgba(255,255,255,.22);}
.btn-primary::before,.btn-wa::before,.copy-btn::before,.add-slot-btn::before{content:'';position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.34),transparent);transform:skewX(-18deg);transition:left .62s var(--ease-out);pointer-events:none;}
.btn-primary:hover::before,.btn-wa:hover::before,.copy-btn:hover::before,.add-slot-btn:hover::before{left:150%;}
.btn-outline{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));box-shadow:inset 0 1px 0 rgba(255,255,255,.08);}
.btn-ghost{box-shadow:none;}
.btn:focus-visible,.btn-hero:focus-visible,.copy-btn:focus-visible,.lang-btn:focus-visible,input:focus-visible,.add-slot-btn:focus-visible,.opt-card:focus-visible{outline:2px solid var(--acc);outline-offset:3px;}

function applyTheme(id) {
  const th = THEMES[id] || THEMES[0];
  const s = document.documentElement.style;
  s.setProperty('--acc', th.acc);
  s.setProperty('--acc-glow', th.glow);
  s.setProperty('--acc-dim', th.dim);
  s.setProperty('--acc-soft', th.soft);
  s.setProperty('--acc-glow2', th.glow2);
  s.setProperty('--bdr-glow', th.bdr);
  s.setProperty('--acc-bg', th.bg);
}

// ── DARK / LIGHT MODE ───────────────────────────────
function getColorMode(){ return localStorage.getItem('cuando_color_mode') || 'dark'; }
function applyColorMode(mode, animate=true){
  mode = mode === 'light' ? 'light' : 'dark';
  document.body.classList.toggle('light-mode', mode === 'light');
  document.body.dataset.mode = mode;
  localStorage.setItem('cuando_color_mode', mode);
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', mode === 'light' ? '#F7F8F0' : '#060610');
  const btn = document.getElementById('modeToggle');
  if(btn){
    btn.setAttribute('aria-label', mode === 'light' ? 'Cambiar a modo oscuro' : 'Cambiar a modo claro');
    btn.innerHTML = mode === 'light' ? '<span>☀</span>' : '<span>☾</span>';
    if(animate){ btn.animate([{transform:'scale(.82) rotate(-12deg)'},{transform:'scale(1) rotate(0deg)'}],{duration:280,easing:'cubic-bezier(.34,1.56,.64,1)'}); }
  }
}
function toggleColorMode(e){
  if(e){ e.stopPropagation(); haptic(); }
  const next = document.body.classList.contains('light-mode') ? 'dark' : 'light';
  applyColorMode(next);
}
applyColorMode(getColorMode(), false);

// ── BASE URL ─────────────────────────────────────────
function base() {
  // URL pública fija: todos los links salen con el dominio real, aunque pruebes desde C:/ o localhost.
  return (SITE_URL || (location.origin + location.pathname)).replace(/\/$/,'');
}
function isLocalhost() {
  return location.hostname==='localhost'||location.hostname==='127.0.0.1'||location.protocol==='file:';
}
function redirectLocalHashToPublic(){
  const hasPublicHash=/^#(plan|results|share)\//.test(location.hash);
  if(hasPublicHash && isLocalhost() && SITE_URL){
    location.replace(base()+location.hash);
    return true;
  }
  return false;
}
redirectLocalHashToPublic();

// ── SPLASH ───────────────────────────────────────────
(function(){
  const sp=document.getElementById('splash');
  const logo=document.getElementById('tpxIntroLogo');
  const fill=document.getElementById('tpxIntroFill');
  const percent=document.getElementById('tpxIntroPercent');
  const isLink=/^#(plan|results|share)\//.test(location.hash);
  const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const duration=reduce?650:3200;
  const exitDuration=reduce?90:900;
  let raf=0, start=0, closed=false;

  if(!sp)return;
  if (logo) logo.onerror=()=>{ logo.src='./tropix.png'; };

  const waitImage=img=>{
    if(!img || img.complete) return Promise.resolve();
    return new Promise(resolve=>{
      img.addEventListener('load',resolve,{once:true});
      img.addEventListener('error',resolve,{once:true});
    });
  };
  const easeOut=t=>1-Math.pow(1-t,3);
  const closeSplash=()=>{
    if(closed)return; closed=true;
    cancelAnimationFrame(raf);
    if(fill)fill.style.width='100%';
    if(percent)percent.textContent='100%';
    sp.classList.add('exit');
    setTimeout(()=>{ sp.style.display='none'; sessionStorage.setItem('sp','1'); }, exitDuration);
  };
  const tick=now=>{
    if(!start)start=now;
    const raw=Math.min((now-start)/duration,1);
    const val=Math.min(100,Math.round(easeOut(raw)*100));
    if(fill)fill.style.width=val+'%';
    if(percent)percent.textContent=val+'%';
    if(raw<1) raf=requestAnimationFrame(tick); else closeSplash();
  };

  // En links compartidos no mostramos intro para que responda rápido.
  if (sessionStorage.getItem('sp')||isLink) { sp.style.display='none'; return; }
  waitImage(logo).finally(()=>{ raf=requestAnimationFrame(tick); });
  setTimeout(closeSplash, duration+1800);
})();

// ── RIPPLE ───────────────────────────────────────────
function ripple(e){
  const btn=e.currentTarget;
  const r=document.createElement('span'); r.className='ripple';
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height)*2;
  const x=(e.clientX||rect.left+rect.width/2)-rect.left-size/2;
  const y=(e.clientY||rect.top+rect.height/2)-rect.top-size/2;
  r.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  btn.appendChild(r); setTimeout(()=>r.remove(),600);
}

// ── CONFETTI ─────────────────────────────────────────
function confetti(ox,oy){
  const c=document.getElementById('confetti-canvas'); if(!c)return;
  const ctx=c.getContext('2d'); c.width=innerWidth; c.height=innerHeight;
  const cols=['#CBFF00','#EFEFEB','#00E28A','#FF4057','#A78BFA','#38BDF8','#FF9500'];
  const shapes=['rect','circle','tri'];
  ox=ox||innerWidth/2; oy=oy||innerHeight*.35;
  const ps=Array.from({length:130},()=>{
    const angle=(Math.random()*360)*Math.PI/180,speed=Math.random()*12+4;
    return{x:ox,y:oy,vx:Math.cos(angle)*speed*(Math.random()+.3),vy:Math.sin(angle)*speed-Math.random()*5,w:Math.random()*9+4,h:Math.random()*14+5,r:Math.random()*360,rs:(Math.random()-.5)*10,g:.2+Math.random()*.15,col:cols[Math.floor(Math.random()*cols.length)],shape:shapes[Math.floor(Math.random()*shapes.length)],life:1,decay:Math.random()*.012+.008};
  });
  let raf;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height); let alive=false;
    ps.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.r+=p.rs; p.life-=p.decay;
      if(p.life<=0)return; alive=true;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r*Math.PI/180); ctx.fillStyle=p.col; ctx.globalAlpha=p.life;
      if(p.shape==='rect')ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      else if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
      else{ctx.beginPath();ctx.moveTo(0,-p.h/2);ctx.lineTo(p.w/2,p.h/2);ctx.lineTo(-p.w/2,p.h/2);ctx.closePath();ctx.fill();}
      ctx.restore();
    });
    if(alive)raf=requestAnimationFrame(draw); else ctx.clearRect(0,0,c.width,c.height);
  }
  draw(); setTimeout(()=>{cancelAnimationFrame(raf);ctx.clearRect(0,0,c.width,c.height);},6000);
}

// ── SCROLL REVEAL ────────────────────────────────────
function initReveal(){
  const els=document.querySelectorAll('.reveal'); if(!els.length)return;
  const io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);} });
  },{threshold:0.12});
  els.forEach(el=>io.observe(el));
}

function getR(){
  const h=location.hash.replace('#','');
  if(!h||h==='/') return{v:'home'};
  if(h==='create') return{v:'create'};
  const m1=h.match(/^plan\/(.+)$/); if(m1)return{v:'respond',id:m1[1]};
  const m2=h.match(/^results\/(.+)$/); if(m2)return{v:'results',id:m2[1]};
  const m3=h.match(/^share\/(.+)$/); if(m3)return{v:'share',id:m3[1]};
  return{v:'home'};
}
function go(h){clearInterval(_ri);clearInterval(_pvLoop);location.hash=h;}
window.addEventListener('hashchange',render);
window.addEventListener('load',render);

// ── RENDER ───────────────────────────────────────────
function render(){
  clearLiveResults(); clearInterval(_pvLoop);
  const r=getR();
  if(r.v==='home'){resetTheme();setV(vHome());requestAnimationFrame(()=>{startPV();initReveal();});}
  else if(r.v==='create'){resetTheme();setV(vCreate());}
  else if(r.v==='share'){setV(vShare(r.id));requestAnimationFrame(initReveal);}
  else if(r.v==='respond')aV(()=>vRespond(r.id));
  else if(r.v==='results')aV(()=>vResults(r.id));
  else{resetTheme();setV(vHome());requestAnimationFrame(()=>{startPV();initReveal();});}
}
function setV(html){
  const isLoader=html.includes('loader-ring');
  const isHome=html.includes('hero-v2');
  document.getElementById('app').innerHTML=`<div class="page-enter ${isHome?'home-page':''}"><div class="view">${html}</div>${isLoader?'':siteFooter()}</div>`;
  setTimeout(()=>{initNavState();hydrateNavIcon();applyColorMode(getColorMode(), false);},0);
}
async function aV(fn){
  setV(`<div class="loader"><div class="loader-ring"></div><span>${t('loading')}</span></div>`);
  try{
    const html=await fn(); setV(html);
    requestAnimationFrame(()=>{
      document.querySelectorAll('.result-fill[data-w]').forEach(el=>setTimeout(()=>el.style.width=el.dataset.w,100));
      document.querySelectorAll('[data-cu]').forEach(el=>countUp(el,parseInt(el.dataset.cu)));
      initReveal();
    });
  }catch(e){
    console.error(e);
    setV(`<div class="loader"><div style="text-align:center;padding:0 20px"><div style="font-size:3rem;margin-bottom:16px;opacity:.4">⚠️</div><div style="color:var(--txt2);margin-bottom:20px">${t('el')}</div><button class="btn btn-outline" style="max-width:200px" onclick="go('')">${t('back')}</button></div></div>`);
  }
}

const DES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],MES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DEN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],MEN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(date,time){
  if(!date)return time||'';
  const d=new Date(date+'T12:00:00');
  const dy=lang==='es'?DES:DEN,mn=lang==='es'?MES:MEN;
  let s=`${dy[d.getDay()]} ${d.getDate()} ${mn[d.getMonth()]}`;
  if(time){const[h,m]=time.split(':');const hr=parseInt(h);s+=` · ${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`;}
  return s;
}
function uid(){return Math.random().toString(36).slice(2,10);}

function countUp(el,target,dur=750){
  const start=Date.now();
  const tick=()=>{const p=Math.min((Date.now()-start)/dur,1);el.textContent=Math.round((1-(1-p)**3)*target);if(p<1)requestAnimationFrame(tick);else el.textContent=target;};
  tick();
}
function copyL(url,btnId){
  const ok=()=>{
    const b=document.getElementById(btnId);
    if(b){b.textContent=t('cpd');b.classList.add('ok');setTimeout(()=>{if(b){b.textContent=t('cp');b.classList.remove('ok');}},2200);}
    toast(lang==='es'?'¡Link copiado!':'Link copied!','📋');
  };
  navigator.clipboard?.writeText(url).then(ok).catch(()=>{
    const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);ok();
  });
}

function initNavState(){
  const nav=document.querySelector('.nav');
  if(!nav)return;
  let ticking=false;
  const update=()=>{
    nav.classList.toggle('nav-float', window.scrollY>18);
    ticking=false;
  };
  if(window.__cuandoNavScroll) window.removeEventListener('scroll', window.__cuandoNavScroll);
  window.__cuandoNavScroll=()=>{
    if(!ticking){requestAnimationFrame(update);ticking=true;}
  };
  update();
  window.addEventListener('scroll', window.__cuandoNavScroll, {passive:true});
}

function startPV(){
  const opts=document.querySelectorAll('.lp-opt');
  const bars=document.querySelectorAll('.lp-bar');
  const cnts=document.querySelectorAll('.lp-count');
  if(!opts.length)return;
  const targets=[96,62,36],seq=[0,1,2],totals=[8,5,3];
  function cycle(){
    opts.forEach(o=>o.classList.remove('hot'));
    bars.forEach(b=>{b.style.transition='none';b.style.width='0%';});
    cnts.forEach(c=>c.textContent='0');
    seq.forEach((idx,step)=>{
      setTimeout(()=>{
        opts[idx].classList.add('hot');
        setTimeout(()=>{bars[idx].style.transition='width .75s var(--ease-out)';bars[idx].style.width=targets[idx]+'%';countUp(cnts[idx],totals[idx],700);},80);
      },step*850);
    });
  }
  cycle(); _pvLoop=setInterval(cycle,5200);
}

function slotHTML(s,k){
  return `<div class="slot" id="slot-${s.id}">
    <div class="slot-num">${t('sn')(k+1)}</div>
    <div class="slot-row">
      <input type="date" value="${s.date}" oninput="upSlot('${s.id}','date',this.value)">
      <input type="time" value="${s.time}" oninput="upSlot('${s.id}','time',this.value)">
      ${_slots.length>2?`<button class="del-btn" onclick="rmSlot('${s.id}')" title="Eliminar">×</button>`:''}
    </div>
  </div>`;
}
function addSlot(){if(_slots.length>=6)return;haptic(6);const s={id:uid(),date:'',time:''};_slots.push(s);document.getElementById('slots-list').insertAdjacentHTML('beforeend',slotHTML(s,_slots.length-1));if(_slots.length>=6){const b=document.getElementById('add-slot-btn');if(b)b.disabled=true;}}
function rmSlot(id){haptic(12);_slots=_slots.filter(x=>x.id!==id);document.getElementById('slot-'+id)?.remove();document.querySelectorAll('.slot-num').forEach((el,k)=>el.textContent=t('sn')(k+1));const b=document.getElementById('add-slot-btn');if(b)b.disabled=false;if(_slots.length<=2)document.querySelectorAll('.del-btn').forEach(b=>b.remove());}
function upSlot(id,field,val){const s=_slots.find(x=>x.id===id);if(s)s[field]=val;}
function saveDemoAndGo(payload){const id='demo-'+uid();sessionStorage.setItem('p:'+id,JSON.stringify({...payload,id}));_slots=[];go('share/'+id);}

async function createPlan(e){
  if(e)ripple(e);
  const title=document.getElementById('plan-title')?.value.trim();
  const creator=document.getElementById('creator-name')?.value.trim();
  const errEl=document.getElementById('create-err');
  const genBtn=document.getElementById('gen-btn');
  if(errEl)errEl.innerHTML='';
  const resetBtn=()=>{ if(genBtn){genBtn.innerHTML=`${I.arr} ${t('gen')}`;genBtn.disabled=false;} };
  const showErr=(msg)=>{ if(errEl)errEl.innerHTML=`<div class="err-msg">⚠️ ${msg}</div>`; resetBtn(); haptic([30,50,30]); };
  if(!title||!creator){showErr(t('ef'));return;}
  const valid=_slots.filter(x=>x.date&&x.time);
  if(valid.length<2){showErr(t('eo'));return;}
  if(!isDB){showErr('Supabase no está conectado. No se generó un link falso. Revisa SUPABASE_URL y SUPABASE_KEY.');return;}
  if(genBtn){genBtn.innerHTML='<span class="btn-spinner"></span>';genBtn.disabled=true;}
  haptic(10);
  const themeId=_themeId||0;
  const payload={title,creator_name:creator,options:valid.map(x=>({id:x.id,date:x.date,time:x.time})),theme_id:themeId};
  try{
    const{data,error}=await db.from('plans').insert(payload).select().single();
    if(error)throw error;
    _slots=[];
    // El plan sí existe en Supabase; ahora los links públicos funcionarán en cualquier dispositivo.
    go('share/'+data.id);
  }catch(err){
    console.error('No se pudo guardar el plan en Supabase:',err);
    showErr('No se pudo guardar el plan en Supabase. No voy a crear un link demo porque ese link no abre en otros dispositivos. Revisa la tabla plans y las políticas RLS.');
  }
}

    </div>
    <div class="pg-title s2" style="padding:0 0 6px">${t('rt')}</div>
    <div class="pg-sub s3" style="padding:0 0 22px;font-size:.9rem">${t('rs')}</div>
    <div id="respond-err"></div>
    ${_plan.options.map((o,k)=>`
      <div class="opt-card s${Math.min(k+4,7)}" data-id="${o.id}" onclick="toggleOpt('${o.id}',this)">
        <div class="opt-ring">${I.chk}</div>
        <div><div class="opt-label">${fmt(o.date,o.time)}</div></div>
      </div>`).join('')}
    <div class="inp-grp s${Math.min(_plan.options.length+4,7)+1}" style="margin-top:26px">
      <label>${t('n_l')}</label>
      <input type="text" id="responder-name" placeholder="${t('n_ph')}" maxlength="40" autocomplete="off">
    </div>
    <button class="btn btn-primary" id="confirm-btn" onclick="submitResponse(event)">${I.chk} ${t('cf')}</button>
  </div>
  `;
  setTimeout(hydrateNavIcon,0);
  return html;
}

function toggleOpt(id,el){haptic(10);_sel.has(id)?_sel.delete(id):_sel.add(id);el.classList.toggle('sel',_sel.has(id));}

async function submitResponse(e){
  if(e)ripple(e);
  const name=document.getElementById('responder-name')?.value.trim();
  const errEl=document.getElementById('respond-err');
  const btn=document.getElementById('confirm-btn');
  if(errEl)errEl.innerHTML='';
  if(!name){if(errEl)errEl.innerHTML=`<div class="err-msg">⚠️ ${t('ef')}</div>`;haptic([30,50,30]);return;}
  if(btn){btn.innerHTML='<span class="btn-spinner"></span>';btn.disabled=true;}
  haptic(10);
  const selected=[..._sel];
  const data={plan_id:_plan.id,name,selected_options:selected};
  if(_plan.id.startsWith('demo-')||!isDB){
    await new Promise(r=>setTimeout(r,500));
    const arr=JSON.parse(sessionStorage.getItem('r:'+_plan.id)||'[]');
    arr.push({...data,selected});sessionStorage.setItem('r:'+_plan.id,JSON.stringify(arr));
    toast(t('saved'),'🎯');setTimeout(()=>go('results/'+_plan.id),900);return;
  }
  try{
    const{error}=await db.from('responses').insert(data);
    if(error)throw error;
    toast(t('saved'),'🎯');setTimeout(()=>go('results/'+_plan.id),900);
  }catch(err){
    console.warn('DB fallback:',err);
    const arr=JSON.parse(sessionStorage.getItem('r:'+_plan.id)||'[]');
    arr.push({...data,selected});sessionStorage.setItem('r:'+_plan.id,JSON.stringify(arr));
    toast(t('saved'),'🎯');setTimeout(()=>go('results/'+_plan.id),900);
  }
}

// ── VIEW: RESULTS ────────────────────────────────────
async function vResults(id){
  _plan=await getPlan(id);
  if(_plan.theme_id!==undefined){_themeId=_plan.theme_id;applyTheme(_themeId);}
  let responses=[];
  if(id.startsWith('demo-')||!isDB){
    responses=JSON.parse(sessionStorage.getItem('r:'+id)||'[]');
  }else{
    try{
      const{data,error}=await db.from('responses').select('*').eq('plan_id',id).order('created_at');
      if(error)throw error;
      responses=data||[];
    }catch(err){
      console.warn('DB fallback:',err);
      responses=JSON.parse(sessionStorage.getItem('r:'+id)||'[]');
    }
  }

  const cnt={},nms={};
  _plan.options.forEach(o=>{cnt[o.id]=0;nms[o.id]=[];});
  responses.forEach(r=>((r.selected_options||r.selected||[])).forEach(x=>{
    if(cnt[x]!==undefined){cnt[x]++;nms[x].push(r.name);}
  }));

  const sorted=[..._plan.options].sort((a,b)=>cnt[b.id]-cnt[a.id]);
  const best=sorted[0];
  const maxC=Math.max(...Object.values(cnt),1);
  const planLink=`${base()}#plan/${id}`;
  const hasBest=responses.length>0&&cnt[best?.id]>0;
  const thName=THEMES[_themeId]?.name||'Lime';
  if(hasBest)setTimeout(()=>confetti(),420);
  if(!id.startsWith('demo-')&&isDB)setTimeout(()=>setupLiveResults(id,responses.length),0);

  const responseLabel=responses.length===1?'respuesta':'respuestas';
  const bestText=hasBest?`${fmt(best.date,best.time)} · ${cnt[best.id]} ${cnt[best.id]===1?'persona':'personas'}`:'Esperando primera respuesta';

  const html=`
  ${nav()}
  <div class="results-shell">
    <button class="back-btn" onclick="go('')">${I.bk} ${t('back')}</button>

    <section class="results-hero-card s1">
      <div class="results-topline">
        <div class="results-status">
          <div class="theme-badge">✦ ${thName} Edition</div>
          <span class="live-pill">LIVE</span>
        </div>
        <button class="refresh-mini" onclick="aV(()=>vResults('${id}'))">${I.clk} ${t('rf')}</button>
      </div>
      <div class="results-title">${escHTML(_plan.title)}</div>
      <div class="results-sub"><strong style="color:var(--txt)">${responses.length}</strong> ${responseLabel} en vivo · ${escHTML(bestText)}</div>
      <div class="results-actions">
        <button class="notify-btn" onclick="askNotify()">🔔 Notificarme cuando respondan</button>
        <button class="notify-btn" onclick="copyL('${planLink}','copy-live-link')" id="copy-live-link">${I.lnk} Copiar link</button>
      </div>
    </section>

    ${responses.length===0?`
      <section class="empty-live s2">
        <div class="empty-live-icon">🕐</div>
        <div class="empty-live-title">Esperando respuestas</div>
        <div class="empty-live-text">Comparte el link y esta pantalla se actualizará sola cuando alguien responda.</div>
        <button class="btn btn-wa" style="max-width:320px;margin:22px auto 0" onclick="${callWa(planLink,_plan.title||'',_plan.creator_name||'')}">${I.wa} ${t('wa')}</button>
      </section>
    `:`
      <div class="results-live-row s2">
        <div class="results-live-title">Disponibilidad del grupo</div>
        <span style="font-size:.82rem;color:var(--txt3)">${responses.length} ${t('nr')}</span>
      </div>
      <section class="results-grid s3">
        ${sorted.map((o,i)=>{
          const names=nms[o.id]||[];
          const pct=Math.round((cnt[o.id]/maxC)*100);
          return `<article class="result-card ${i===0&&cnt[o.id]>0?'best':''}">
            <div class="result-card-head">
              <div>
                <div class="result-time">${fmt(o.date,o.time)}</div>
                <div style="font-size:.78rem;color:var(--txt3);margin-top:4px">${names.length?escHTML(names.length+' disponible'+(names.length===1?'':'s')):'Sin votos todavía'}</div>
              </div>
              <div class="result-score" data-cu="${cnt[o.id]}">0</div>
            </div>
            <div class="result-track big"><div class="result-fill" data-w="${pct}%"></div></div>
            ${names.length?`<div class="result-names pills">${names.map(n=>`<span class="name-pill">${escHTML(n)}</span>`).join('')}</div>`:''}
          </article>`;
        }).join('')}
      </section>
    `}

    <div style="height:22px"></div>
    <button class="btn btn-wa s4" onclick="${callWa(planLink,_plan.title||'',_plan.creator_name||'')}">${I.wa} ${t('sa')}</button>
    <button class="btn btn-outline s5" onclick="initCreate(event)">${t('more')}</button>
  </div>`;
  setTimeout(hydrateNavIcon,0);
  return html;
}

// ── LIVE RESULTS + NOTIFICATIONS ────────────────────
function askNotify(){
  if(!('Notification' in window)){toast('Tu navegador no soporta notificaciones','🔕');return;}
  if(Notification.permission==='granted'){toast('Notificaciones activadas','🔔');return;}
  Notification.requestPermission().then(p=>toast(p==='granted'?'Notificaciones activadas':'Notificaciones no activadas',p==='granted'?'🔔':'🔕'));
}
function notifyResponse(name){
  const msg=`${name||'Alguien'} ya respondió`;
  toast(msg,'🔔',4200);
  if('Notification' in window && Notification.permission==='granted'){
    try{new Notification('CUÁNDO', { body: msg, icon:'./img/cuando-icon.png', tag:'cuando-response' });}catch(e){}
  }
}
function setupLiveResults(id,currentCount=0){
  clearLiveResults();
  _lastResultCount=currentCount;
  if(!isDB||id.startsWith('demo-'))return;
  try{
    _rtChannel=db.channel('cuando-results-'+id+'-'+Date.now())
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'responses',filter:`plan_id=eq.${id}`},payload=>{
        const name=payload?.new?.name||'Alguien';
        _lastResultCount++;
        notifyResponse(name);
        setTimeout(()=>aV(()=>vResults(id)),380);
      })
      .subscribe(status=>console.log('Realtime responses:',status));
  }catch(e){console.warn('Realtime no disponible:',e);}

  // Fallback real: refresca cada 4 segundos aunque Realtime no esté activo.
  _ri=setInterval(async()=>{
    try{
      const {data,error}=await db.from('responses').select('id,name,created_at').eq('plan_id',id).order('created_at');
      if(error)throw error;
      const list=data||[];
      if(list.length>_lastResultCount){
        const last=list[list.length-1];
        _lastResultCount=list.length;
        notifyResponse(last?.name||'Alguien');
        aV(()=>vResults(id));
      }
    }catch(e){console.warn('Live fallback:',e);}
  },4000);
}

// ── DATA ─────────────────────────────────────────────
async function getPlan(id){
  const cached=sessionStorage.getItem('p:'+id);
  if(cached)return JSON.parse(cached);
  if(!isDB)throw new Error('Plan not found');
  try{const{data,error}=await db.from('plans').select('*').eq('id',id).single();if(error)throw error;return data;}
  catch(e){throw new Error('Plan not found');}
}
</script>
